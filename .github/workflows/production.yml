name: Production CI/CD

on:
  push:
    branches:
      - master

#############################################################
# Least Privilege Permissions
#############################################################

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  DOMAIN: https://your-subdomain.duckdns.org

#############################################################
# Prevent multiple deployments running simultaneously
#############################################################

concurrency:
  group: production
  cancel-in-progress: true

jobs:

#############################################################
# 1. STATIC APPLICATION SECURITY TESTING
#############################################################

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install --no-cache-dir semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: semgrep scan --config auto
#############################################################
# 2. BUILD & PUSH IMAGES
#############################################################

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          --username "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

##################################################
# BACKEND
##################################################

      - name: Build Backend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:latest \
          ./backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:latest

##################################################
# FRONTEND
##################################################

      - name: Build Frontend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:latest \
          ./frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:latest

#############################################################
# 3. DYNAMIC APPLICATION SECURITY TESTING
#############################################################

  dast:
    name: DAST Scan
    runs-on: ubuntu-latest
    needs: build

    continue-on-error: true

    steps:

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.DOMAIN }}

#############################################################
# 4. TERRAFORM OUTPUTS
#############################################################

  infrastructure:
    name: Fetch Terraform Outputs
    runs-on: ubuntu-latest

    needs:
      - build
      - dast

    outputs:
      instance: ${{ steps.outputs.outputs.instance }}

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform-ec2
        run: terraform init

      - id: outputs
        working-directory: terraform-ec2
        run: |
          echo "instance=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

#############################################################
# 5. DEPLOY THROUGH AWS SSM
#############################################################

  deploy:
    name: Canary Deployment
    runs-on: ubuntu-latest

    needs: infrastructure

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Through SSM
        run: |

          aws ssm send-command \
          --instance-ids "${{ needs.infrastructure.outputs.instance }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Production Deployment" \
          --parameters commands='

          set -e

          mkdir -p /home/ubuntu/app

          cd /home/ubuntu/app

          ##################################################
          # OPTIONAL
          ##################################################

          # Uncomment if you want the server to clone
          # the repository itself.

          # git clone https://github.com/USERNAME/PokieTicker.git .

          ##################################################
          # OPTIONAL
          ##################################################

          # Uncomment if using git deployment

          # git pull origin main

          ##################################################
          # Docker Login
          ##################################################

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          --username "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

          ##################################################
          # Pull latest images
          ##################################################

          docker compose -f docker-compose.prod.yml pull

          ##################################################
          # Canary
          ##################################################

          docker compose -f docker-compose.prod.yml --profile canary up -d backend-canary frontend-canary

          sleep 30

          docker compose ps

          ##################################################
          # Promote Production
          ##################################################

          docker compose -f docker-compose.prod.yml up -d backend frontend

          ##################################################
          # Cleanup
          ##################################################

          docker image prune -af

          ##################################################
          # Nginx
          ##################################################

          sudo nginx -t && sudo systemctl reload nginx

          ##################################################
          # Renew SSL
          ##################################################

          sudo certbot renew --quiet

          ' \
          --output text

#############################################################
# 6. HEALTH CHECK
#############################################################

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest

    needs: deploy

    steps:

      - name: Wait
        run: sleep 30

      - name: Verify Frontend
        run: |
          curl -f ${{ env.DOMAIN }}

      - name: Verify Backend
        run: |
          curl -f ${{ env.DOMAIN }}/api/health
























