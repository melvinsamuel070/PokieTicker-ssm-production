name: Production CI/CD

on:
  push:
    branches:
      - master

#############################################################
# Least Privilege Permissions
#############################################################

permissions:
  contents: read
  issues: write

env:
  AWS_REGION: us-east-1

  ###########################################################
  # Use HTTP initially.
  #
  # After manually configuring Certbot,
  # simply change http:// to https://
  ###########################################################
  DOMAIN: http://your-subdomain.duckdns.org

#############################################################
# Prevent multiple deployments running simultaneously
#############################################################

concurrency:
  group: production
  cancel-in-progress: true

jobs:

#############################################################
# 1. STATIC APPLICATION SECURITY TESTING
#############################################################

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install --no-cache-dir semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep scan --config auto

#############################################################
# 2. BUILD & PUSH IMAGES
#############################################################

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    needs: sast

    steps:

      - uses: actions/checkout@v4

##################################################
# Login DockerHub
##################################################

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          --username "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

##################################################
# BACKEND
##################################################

      - name: Build Backend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:latest \
            ./backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-backend:latest

##################################################
# FRONTEND
##################################################

      - name: Build Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:latest \
            ./frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/pokieticker-frontend:latest

          #############################################################
# 3. PROVISION INFRASTRUCTURE
#############################################################

  infrastructure:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    needs:
      - build

    outputs:
      instance: ${{ steps.outputs.outputs.instance }}
      public_ip: ${{ steps.outputs.outputs.public_ip }}
      subnet: ${{ steps.outputs.outputs.subnet }}
      vpc: ${{ steps.outputs.outputs.vpc }}

    steps:

##################################################
# Checkout
##################################################

      - uses: actions/checkout@v4

##################################################
# Configure AWS
##################################################

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

##################################################
# Install Terraform
##################################################

      - uses: hashicorp/setup-terraform@v3

##################################################
# Terraform Format Check
##################################################

      - name: Terraform Format
        working-directory: terraform-ec2
        run: terraform fmt -check -recursive

##################################################
# Terraform Init
##################################################

      - name: Terraform Init
        working-directory: terraform-ec2
        run: terraform init

##################################################
# Terraform Validate
##################################################

      - name: Terraform Validate
        working-directory: terraform-ec2
        run: terraform validate

##################################################
# Terraform Plan
##################################################

      - name: Terraform Plan
        working-directory: terraform-ec2
        run: terraform plan -out=tfplan

##################################################
# Terraform Apply
##################################################

      - name: Terraform Apply
        working-directory: terraform-ec2
        run: terraform apply -auto-approve tfplan

##################################################
# Wait For EC2 Boot
##################################################

      - name: Wait for EC2 Initialization
        run: |
          echo "Waiting for EC2 to boot..."
          sleep 60

##################################################
# Wait Until SSM Registers Instance
##################################################

      - name: Wait for SSM Registration
        working-directory: terraform-ec2
        run: |

          INSTANCE_ID=$(terraform output -raw instance_id)

          echo "Waiting for SSM registration..."

          for i in {1..30}; do

            STATUS=$(aws ssm describe-instance-information \
              --region ${{ env.AWS_REGION }} \
              --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
              --output text)

            if [ "$STATUS" = "Online" ]; then
              echo "Instance is online in SSM."
              exit 0
            fi

            echo "Attempt $i: Instance not ready..."
            sleep 10

          done

          echo "Timed out waiting for SSM."
          exit 1

##################################################
# Export Terraform Outputs
##################################################

      - id: outputs
        working-directory: terraform-ec2
        run: |

          echo "instance=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

          echo "public_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

          echo "subnet=$(terraform output -raw public_subnet_id)" >> $GITHUB_OUTPUT

          echo "vpc=$(terraform output -raw vpc_id)" >> $GITHUB_OUTPUT

##################################################
# Display Outputs
##################################################

      - name: Display Outputs
        working-directory: terraform-ec2
        run: |

          echo "Instance ID : $(terraform output -raw instance_id)"
          echo "Public IP   : $(terraform output -raw instance_public_ip)"
          echo "Subnet      : $(terraform output -raw public_subnet_id)"
          echo "VPC         : $(terraform output -raw vpc_id)"

          #############################################################
# 4. DEPLOY THROUGH AWS SSM
#############################################################

  deploy:
    name: Canary Deployment
    runs-on: ubuntu-latest

    needs: infrastructure

    steps:

##################################################
# Checkout Repository
##################################################

      - uses: actions/checkout@v4

##################################################
# Configure AWS Credentials
##################################################

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

##################################################
# Deploy Through AWS SSM
##################################################

      - name: Deploy Application
        run: |

          aws ssm send-command \
          --instance-ids "${{ needs.infrastructure.outputs.instance }}" \
          --document-name "AWS-RunShellScript" \
          --comment "PokieTicker Production Deployment" \
          --parameters commands='

          ##################################################
          # Exit immediately if anything fails
          ##################################################

          set -e

          ##################################################
          # Create application directory
          ##################################################

          mkdir -p /home/ubuntu/app

          cd /home/ubuntu/app

          ##################################################
          # OPTIONAL
          # Clone the repository on first deployment.
          ##################################################

          # git clone https://github.com/<YOUR_GITHUB_USERNAME>/PokieTicker.git .

          ##################################################
          # OPTIONAL
          # Pull latest source if deploying from Git.
          ##################################################

          # git pull origin master

          ##################################################
          # Download .env from AWS Systems Manager Parameter Store
          ##################################################

          aws ssm get-parameter \
            --name "/pokieticker/prod/.env" \
            --with-decryption \
            --query Parameter.Value \
            --output text > .env

          ##################################################
          # Login to Docker Hub
          ##################################################

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

          ##################################################
          # Pull latest Docker images
          ##################################################

          docker compose -f docker-compose.prod.yml pull

          ##################################################
          # Stop any old canary containers
          ##################################################

          docker compose -f docker-compose.prod.yml \
            --profile canary down || true

          ##################################################
          # Start Canary Containers
          ##################################################

          docker compose \
            -f docker-compose.prod.yml \
            --profile canary \
            up -d \
            backend-canary \
            frontend-canary

          ##################################################
          # Give the containers time to start
          ##################################################

          sleep 30

          ##################################################
          # Show running containers
          ##################################################

          docker compose -f docker-compose.prod.yml ps

                    ##################################################
          # Verify Canary Containers
          ##################################################

          docker compose \
            -f docker-compose.prod.yml \
            --profile canary \
            ps

          ##################################################
          # Promote Canary to Production
          ##################################################

          docker compose \
            -f docker-compose.prod.yml \
            up -d \
            backend \
            frontend

          ##################################################
          # Remove Canary Containers
          ##################################################

          docker compose \
            -f docker-compose.prod.yml \
            --profile canary \
            down || true

          ##################################################
          # Remove Unused Images
          ##################################################

          docker image prune -af

          ##################################################
          # Validate Nginx Configuration
          ##################################################

          sudo nginx -t

          ##################################################
          # Reload Nginx
          ##################################################

          sudo systemctl reload nginx

          ##################################################
          # Renew Existing Certificates
          #
          # NOTE:
          # This only renews certificates.
          # The first certificate must be created manually.
          ##################################################

          sudo certbot renew --quiet || true

          ##################################################
          # Deployment Finished
          ##################################################

          echo "Deployment completed successfully."

          ' \
          --output text

##################################################
# Wait for SSM Command to Finish
##################################################

      - name: Wait for Deployment Completion
        run: |

          COMMAND_ID=$(aws ssm list-commands \
            --max-items 1 \
            --query "Commands[0].CommandId" \
            --output text)

          echo "Waiting for SSM command: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ needs.infrastructure.outputs.instance }}"

##################################################
# Show Command Output
##################################################

      - name: Display Deployment Logs
        run: |

          COMMAND_ID=$(aws ssm list-commands \
            --max-items 1 \
            --query "Commands[0].CommandId" \
            --output text)

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ needs.infrastructure.outputs.instance }}"

            #############################################################
# 5. DEPLOY THROUGH AWS SSM
#############################################################

  deploy:
    name: Canary Deployment
    runs-on: ubuntu-latest

    needs: infrastructure

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

##################################################
# Deploy Through AWS SSM
##################################################

      - name: Deploy Application
        id: deploy
        run: |

          COMMAND_ID=$(
          aws ssm send-command \
            --instance-ids "${{ needs.infrastructure.outputs.instance }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Production Deployment" \
            --query "Command.CommandId" \
            --output text \
            --parameters commands='

            set -e

            APP_DIR=/home/ubuntu/app

            mkdir -p $APP_DIR

            cd $APP_DIR

            ##################################################
            # OPTIONAL
            ##################################################

            # Clone repository the first time

            # git clone https://github.com/YOUR_USERNAME/PokieTicker.git .

            ##################################################
            # OPTIONAL
            ##################################################

            # Update repository

            # git pull origin master

            ##################################################
            # Login DockerHub
            ##################################################

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

            ##################################################
            # Pull Images
            ##################################################

            docker compose -f docker-compose.prod.yml pull

            ##################################################
            # Start Canary
            ##################################################

            docker compose \
            -f docker-compose.prod.yml \
            --profile canary \
            up -d backend-canary frontend-canary

            ##################################################
            # Allow Containers To Start
            ##################################################

            sleep 30

            docker compose ps

            ##################################################
            # Promote Production
            ##################################################

            docker compose \
            -f docker-compose.prod.yml \
            up -d backend frontend

            ##################################################
            # Remove Unused Images
            ##################################################

            docker image prune -af

            ##################################################
            # Reload Nginx
            ##################################################

            sudo nginx -t

            sudo systemctl reload nginx

            ##################################################
            # Renew Existing Certificate
            ##################################################

            sudo certbot renew --quiet || true

            ##################################################
            # Finished
            ##################################################

            echo "Deployment Complete"

            '
          )

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

##################################################
# Wait For Deployment
##################################################

      - name: Wait For Deployment
        run: |

          aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ needs.infrastructure.outputs.instance }}"

##################################################
# Verify Deployment Status
##################################################

      - name: Check Deployment Status
        run: |

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ needs.infrastructure.outputs.instance }}" \
            --query Status \
            --output text)

          echo "Deployment Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ needs.infrastructure.outputs.instance }}" \
              --query StandardErrorContent \
              --output text

            exit 1

          fi

          #############################################################
# 6. VERIFY DEPLOYMENT
#############################################################

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest

    needs:
      - deploy

    steps:

##################################################
# Wait for Services
##################################################

      - name: Wait
        run: sleep 60

##################################################
# Configure AWS Credentials
##################################################

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

##################################################
# Check Containers
##################################################

      - name: Verify Containers
        run: |

          aws ssm send-command \
          --instance-ids "${{ needs.infrastructure.outputs.instance }}" \
          --document-name "AWS-RunShellScript" \
          --parameters commands='

          docker ps

          docker compose -f /home/ubuntu/app/docker-compose.prod.yml ps

          ' \
          --output text

##################################################
# Verify Frontend
##################################################

      - name: Verify Frontend
        run: |

          curl \
          --retry 10 \
          --retry-delay 10 \
          --retry-all-errors \
          --fail \
          ${{ env.DOMAIN }}

##################################################
# Verify Backend API
##################################################

      - name: Verify Backend
        run: |

          curl \
          --retry 10 \
          --retry-delay 10 \
          --retry-all-errors \
          --fail \
          ${{ env.DOMAIN }}/api/health

##################################################
# Finished
##################################################

      - name: Success
        run: |
          echo "===================================="
          echo "Production Deployment Successful"
          echo "===================================="